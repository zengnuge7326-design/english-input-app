<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8a84b"/>
      <stop offset="100%" style="stop-color:#e8c96a"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d4a7a"/>
      <stop offset="100%" style="stop-color:#1a3a6a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="280" fill="url(#bg)"/>

  <!-- Decorative corner arcs -->
  <circle cx="0" cy="0" r="120" fill="none" stroke="#c8a84b" stroke-width="1" opacity="0.15"/>
  <circle cx="400" cy="280" r="150" fill="none" stroke="#c8a84b" stroke-width="1" opacity="0.12"/>

  <!-- Gold top stripe -->
  <rect x="0" y="0" width="400" height="6" fill="url(#stripe)"/>

  <!-- Book icon group -->
  <g transform="translate(44, 60)">
    <!-- Book body -->
    <rect x="0" y="0" width="52" height="66" rx="3" fill="url(#bookGrad)" stroke="#c8a84b" stroke-width="1.5"/>
    <!-- Spine highlight -->
    <rect x="0" y="0" width="7" height="66" rx="2" fill="#1a3a6a"/>
    <line x1="7" y1="0" x2="7" y2="66" stroke="#c8a84b" stroke-width="1"/>
    <!-- Page lines -->
    <line x1="14" y1="14" x2="44" y2="14" stroke="#c8a84b" stroke-width="1" opacity="0.6"/>
    <line x1="14" y1="22" x2="44" y2="22" stroke="#c8a84b" stroke-width="1" opacity="0.4"/>
    <line x1="14" y1="30" x2="44" y2="30" stroke="#c8a84b" stroke-width="1" opacity="0.4"/>
    <line x1="14" y1="38" x2="36" y2="38" stroke="#c8a84b" stroke-width="1" opacity="0.3"/>
    <!-- NCE label on book -->
    <text x="26" y="56" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#c8a84b" font-weight="bold">NCE</text>
  </g>

  <!-- Main title -->
  <text x="122" y="92" font-family="Georgia, serif" font-size="22" fill="#ffffff" font-weight="bold" letter-spacing="1">新概念英语</text>
  <text x="122" y="118" font-family="Georgia, serif" font-size="13" fill="#c8a84b" letter-spacing="3">New Concept English</text>

  <!-- Divider line -->
  <line x1="122" y1="130" x2="360" y2="130" stroke="#c8a84b" stroke-width="1" opacity="0.5"/>

  <!-- Book 1 label -->
  <text x="122" y="152" font-family="Arial, sans-serif" font-size="13" fill="#aab4c8" letter-spacing="1">第一册 · Book One</text>

  <!-- Stats row -->
  <rect x="122" y="165" width="80" height="22" rx="11" fill="#c8a84b" opacity="0.15"/>
  <text x="162" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c8a84b">69 课</text>

  <rect x="212" y="165" width="90" height="22" rx="11" fill="#c8a84b" opacity="0.15"/>
  <text x="257" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c8a84b">1421 句</text>

  <!-- Bottom tagline -->
  <text x="200" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6b7a94" letter-spacing="2">BEGINNER · DIALOGUE</text>

  <!-- Gold bottom stripe -->
  <rect x="0" y="274" width="400" height="6" fill="url(#stripe)"/>
</svg>
