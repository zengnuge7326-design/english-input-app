# OK英语 站点 Nginx 配置（仓库唯一可信版本）
# 部署：scp 到 /www/server/panel/vhost/nginx/english-app.conf 后 `nginx -t && nginx -s reload`
#
# 缓存策略（彻底消除「更新后还看到旧版」）：
#   - index.html：绝不缓存，每次回源（入口指针必须最新）
#   - 哈希静态资源（index-xxxx.js 等）：immutable 长缓存（文件名变即重新下载）

server {
    listen 80;
    server_name okenglish.site www.okenglish.site;
    return 301 https://okenglish.site$request_uri;
}

server {
    listen 443 ssl;
    server_name www.okenglish.site;
    ssl_certificate /etc/letsencrypt/live/okenglish.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/okenglish.site/privkey.pem;
    return 301 https://okenglish.site$request_uri;
}

server {
    listen 443 ssl;
    server_name okenglish.site;

    ssl_certificate /etc/letsencrypt/live/okenglish.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/okenglish.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /www/wwwroot/english-app;
    index index.html;

    # API 反向代理
    location /admin-panel {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 入口 HTML：永不缓存，保证用户始终拿到指向最新 bundle 的指针
    # 用 add_header always 单一来源；不写 expires，避免 nginx 再吐一个重复的 Cache-Control
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 哈希静态资源：内容不变即文件名不变，可放心长缓存 + immutable
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|mp3)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # data/json 业务数据：强制每次校验，避免课程数据陈旧
    location ~* \.json$ {
        add_header Cache-Control "no-cache" always;
    }

    access_log /www/wwwlogs/english-app.log;
    error_log /www/wwwlogs/english-app.error.log;
}
